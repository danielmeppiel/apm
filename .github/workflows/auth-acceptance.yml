name: Auth Acceptance Tests

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode'
        type: choice
        options:
          - all
          - mega
        default: 'all'
      public_repo:
        description: 'Public test repo (owner/repo)'
        default: 'microsoft/apm-sample-package'
      private_repo:
        description: 'Private test repo (owner/repo, optional)'
        required: false
      private_repo_2:
        description: 'Private test repo from 2nd org (owner/repo, optional)'
        required: false
      emu_repo:
        description: 'EMU internal test repo (owner/repo, optional)'
        required: false
      ghe_repo:
        description: 'GHE Cloud test repo (org/repo@host, optional)'
        required: false
      ado_repo:
        description: 'Azure DevOps test repo (dev.azure.com/org/project/_git/repo, optional)'
        required: false
      git_url_repo:
        description: 'Private repo for git: URL object format (owner/repo, optional)'
        required: false
      git_url_public_repo:
        description: 'Public repo for git: URL object format (owner/repo, optional)'
        required: false

env:
  PYTHON_VERSION: '3.12'

permissions:
  contents: read

jobs:
  auth-tests:
    runs-on: ubuntu-latest
    environment: auth-acceptance  # configure PAT secrets in this environment
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Install APM in dev mode
        run: uv run pip install -e .

      - name: Run auth acceptance tests
        env:
          APM_BINARY: .venv/bin/apm
          AUTH_TEST_PUBLIC_REPO: ${{ inputs.public_repo }}
          AUTH_TEST_PRIVATE_REPO: ${{ inputs.private_repo }}
          AUTH_TEST_PRIVATE_REPO_2: ${{ inputs.private_repo_2 }}
          AUTH_TEST_EMU_REPO: ${{ inputs.emu_repo }}
          AUTH_TEST_GHE_REPO: ${{ inputs.ghe_repo }}
          AUTH_TEST_ADO_REPO: ${{ inputs.ado_repo }}
          AUTH_TEST_GIT_URL_REPO: ${{ inputs.git_url_repo }}
          AUTH_TEST_GIT_URL_PUBLIC_REPO: ${{ inputs.git_url_public_repo }}
          GITHUB_APM_PAT: ${{ secrets.AUTH_TEST_GITHUB_APM_PAT }}
          GITHUB_TOKEN: ${{ secrets.AUTH_TEST_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.AUTH_TEST_GH_TOKEN }}
          ADO_APM_PAT: ${{ secrets.AUTH_TEST_ADO_APM_PAT }}
          GITHUB_APM_PAT_MCAPS_MICROSOFT: ${{ secrets.AUTH_TEST_GITHUB_APM_PAT_MCAPS_MICROSOFT }}
          GITHUB_APM_PAT_DEVEXPGBB: ${{ secrets.AUTH_TEST_GITHUB_APM_PAT_DEVEXPGBB }}
        run: |
          if [ "${{ inputs.mode }}" = "mega" ]; then
            ./scripts/test-auth-acceptance.sh --mega
          else
            ./scripts/test-auth-acceptance.sh
          fi
